  -D SERVERNAME="\"Dig-Quad-V3-AEPlus\""
  -D WLED_RELEASE_NAME="\"Dig-Quad-V3-AEPlus\""
  ${digboards.build_flags_dig_quad_aeplus}
  ${digboards.build_flags_dig_ar_aeplus}
  ${digboards.build_flags_temperature}
  ${esp32.AR_build_flags}
