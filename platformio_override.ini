[platformio]
#
# This list defines what firmwares to build. You can remove the # before the name to enable it. Add a # in front of the line to disable.
# Make sure at least 1 is enabled before triggering the build process.
# This file is based on the WLED release 0.15.4 source code, and might not work for other versions. Adapt as required below.
#
default_envs = 
# Dig-Octa
  dig-Octa_32-8L
  dig-Octa_32-8L-Temp

# Dig-Quad
  dig-Quad-V3
 #Dig-Quad V3 with QuinLED-ESP32-AE+ Full (Touch button, IR and 3 outputs & mic) & temperature sensor installed
  dig-Quad-V3-AEplus

# Dig-Uno
  dig-Uno-V3
 #Dig-Uno V3 with QuinLED-ESP32-AE+ Full (Touch button, IR and 3 outputs & mic) & temperature sensor installed
  dig-Uno-V3-AEplus

# Dig2Go
  dig2go
  
# Dig-Next-2
  dig-next-2

# An-Penta-Mini
  an_penta_mini

# An-Penta-Plus
  an_penta_plus
  
# An-Penta-Deca
  an_penta_deca

#
# Common settings for boards
#

[digboards]
build_flags_quinled=
  -D WLED_REPO=\"intermittech/QuinLED-Firmware\"
  -D WLED_BRAND="\"QuinLED\""
build_flags_ethernet = 
  -D WLED_USE_ETHERNET
  -D WLED_ETH_DEFAULT=4
build_flags_dig_ar = 
  -D SR_DMTYPE=1
  -D I2S_SDPIN=-1
  -D I2S_WSPIN=-1
  -D I2S_CKPIN=-1
  -D SR_SQUELCH=10
  -D SR_GAIN=30
build_flags_dig_ar_aeplus =
  -D SR_DMTYPE=1
  -D I2S_SDPIN=25
  -D I2S_WSPIN=27
  -D I2S_CKPIN=32 
  -D SR_SQUELCH=10
  -D SR_GAIN=30
  -D BTNPIN=33
  -D IRPIN=26
build_flags_dig_quad =
  -D NOWIFISLEEP=false
  -D WLED_DISABLE_BLYNK
  -D BTNPIN=0
  -D IRPIN=-1
  -D PIXEL_COUNTS=30,30,30,30
  -D DATA_PINS=16,3,1,4
  -D ABL_MILLIAMPS_DEFAULT=1250
  -D USERMOD_MULTI_RELAY
  -D MULTI_RELAY_MAX_RELAYS=4
  -D MULTI_RELAY_PINS=15,-1,-1,-1
build_flags_dig_quad_aeplus =
  -D NOWIFISLEEP=false
  -D WLED_DISABLE_BLYNK
  -D BTNPIN=33
  -D IRPIN=26
  -D PIXEL_COUNTS=30,30,30,30,30,30,30
  -D DATA_PINS=16,3,1,4,21,17,22
  -D ABL_MILLIAMPS_DEFAULT=1250
  -D USERMOD_MULTI_RELAY
  -D MULTI_RELAY_MAX_RELAYS=4
  -D MULTI_RELAY_PINS=15,-1,-1,-1
build_flags_dig_uno =
  -D NOWIFISLEEP=false
  -D WLED_DISABLE_BLYNK
  -D BTNPIN=0
  -D IRPIN=-1
  -D PIXEL_COUNTS=30,30
  -D DATA_PINS=16,3
  -D ABL_MILLIAMPS_DEFAULT=1250
  -D USERMOD_MULTI_RELAY
  -D MULTI_RELAY_MAX_RELAYS=4
  -D MULTI_RELAY_PINS=15,-1,-1,-1
build_flags_dig_uno_aeplus =
  -D NOWIFISLEEP=false
  -D WLED_DISABLE_BLYNK
  -D BTNPIN=33
  -D IRPIN=26
  -D PIXEL_COUNTS=30,30,30,30,30
  -D DATA_PINS=16,3,21,17,22
  -D ABL_MILLIAMPS_DEFAULT=1250
  -D USERMOD_MULTI_RELAY
  -D MULTI_RELAY_MAX_RELAYS=4
  -D MULTI_RELAY_PINS=15,-1,-1,-1
build_flags_temperature =
  -D USERMOD_DALLASTEMPERATURE
  -D TEMPERATURE_PIN=13
lib_deps_temperature =
  OneWire@~2.3.5
  milesburton/DallasTemperature@^3.9.0
  
  

#
#
# Dig-Next2
#

[env:dig-next-2]
upload_speed = 921600
platform = ${esp32_idf_V4.platform}
build_unflags = ${common.build_unflags}
board = esp32dev
#custom_usermods = audioreactive multi_relay sht
build_flags = ${common.build_flags} ${esp32_idf_V4.build_flags} 
  ${digboards.build_flags_quinled}
  -D BOARD_HAS_PSRAM
  -D WLED_DISABLE_LOXONE
  -D WLED_DISABLE_BLYNK
  -D WLED_PRODUCT_NAME="\"Dig-Next-2\""
  -D WLED_RELEASE_NAME="\"Dig-Next-2\""
  -D SERVERNAME="\"Dig-Next-2\""
  -D NOWIFISLEEP=false
  -D DATA_PINS="2,4"
  -D PIXEL_COUNTS="30,30"
  -D ABL_MILLIAMPS_DEFAULT=5000
  -D BTNPIN=34,35,-1,-1
  -D BTNTYPE=BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH
  -D I2CSDAPIN=15
  -D I2CSCLPIN=14
  -D USERMOD_AUDIOREACTIVE
  -D SR_DMTYPE=5
  -D I2S_SDPIN=7
  -D I2S_WSPIN=8
  -D I2S_CKPIN=-1
  -D SR_SQUELCH=10
  -D SR_GAIN=30
  -D I2S_USE_16BIT_SAMPLES
  -D USERMOD_MULTI_RELAY
  -D MULTI_RELAY_MAX_RELAYS=4
  -D MULTI_RELAY_PINS=5,20,21,22
  -D USERMOD_SHT
lib_deps = 
  ${esp32_idf_V4.lib_deps}
  kosme/arduinoFFT @ 2.0.1
  robtillaart/SHT85@~0.3.3
monitor_filters = esp32_exception_decoder
board_build.partitions = ${esp32.large_partitions}
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.flash_mode = dio
extra_scripts = ${scripts_defaults.extra_scripts}


#
#
# An-Penta-Deca
#

[env:an_penta_deca]
extends = esp32dev
board = esp32dev
platform = ${esp32.platform}
platform_packages = ${esp32.platform_packages}
build_unflags = ${common.build_unflags}
lib_deps = ${esp32.lib_deps}
board_build.partitions = ${esp32.default_partitions}
build_flags = ${common.build_flags} ${esp32.build_flags}
  ${digboards.build_flags_quinled}
  -D WLED_PRODUCT_NAME="\"An-Penta-Deca\""
  -D SERVERNAME="\"An-Penta-Deca\""
  -D WLED_RELEASE_NAME="\"An-Penta-Deca\""
  -D DATA_PINS=2,4,5,12,13,14,17,18,19,21,22,23,25,26,27
  -D LED_TYPES=TYPE_ANALOG_5CH
  -D BTNPIN=36,39,34,33
  -D BTNTYPE=BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH
  -D I2CSDAPIN=15
  -D I2CSCLPIN=16
  -D USERMOD_MULTI_RELAY
  -D MULTI_RELAY_MAX_RELAYS=4
  -D MULTI_RELAY_PINS=-1,-1,-1,-1
monitor_filters = esp32_exception_decoder
extra_scripts = ${scripts_defaults.extra_scripts}
  
#
#
# An-Penta-plus
#

[env:an_penta_plus]
extends = esp32dev
board = esp32dev
platform = ${esp32.platform}
platform_packages = ${esp32.platform_packages}
build_unflags = ${common.build_unflags}
lib_deps = ${esp32.lib_deps}
board_build.partitions = ${esp32.default_partitions}
build_flags = ${common.build_flags} ${esp32.build_flags}
  ${digboards.build_flags_quinled}
  -D WLED_PRODUCT_NAME="\"An-Penta-Plus\""
  -D SERVERNAME="\"An-Penta-Plus\""
  -D WLED_RELEASE_NAME="\"An-Penta-Plus\""
  -D DATA_PINS=2,4,12,32,33,5
  -D LED_TYPES=TYPE_ANALOG_5CH,TYPE_WS2812_RGB
  -D PIXEL_COUNTS=1,30
  -D ABL_MILLIAMPS_DEFAULT=1250
  -D BTNPIN=36,39,34,-1
  -D BTNTYPE=BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH
  -D USERMOD_MULTI_RELAY
  -D MULTI_RELAY_MAX_RELAYS=4
  -D MULTI_RELAY_PINS=13,-1,-1,-1
  -D I2CSDAPIN=15
  -D I2CSCLPIN=16
  -D WLED_AUTOSEGMENTS
  -D WLED_USE_ETHERNET
  -D WLED_ETH_DEFAULT=8
  # The USERMOD_TEST_MODE displays a test pattern on the outputs for factory testing. This usermod is optional.
  #-D USERMOD_TEST_MODE
monitor_filters = esp32_exception_decoder
extra_scripts = ${scripts_defaults.extra_scripts}
#
# 
# An-Penta-Mini
#

[env:an_penta_mini]
extends = esp32c3dev
platform = ${esp32c3.platform}
platform_packages = ${esp32c3.platform_packages}
framework = arduino
board = esp32-c3-devkitm-1
board_build.partitions = tools/WLED_ESP32_4MB_1MB_FS.csv
lib_deps = ${esp32c3.lib_deps}
build_unflags = ${common.build_unflags}
build_flags = ${common.build_flags} ${esp32c3.build_flags}
   ${digboards.build_flags_quinled}
  -D WLED_PRODUCT_NAME="\"An-Penta-Mini\""
  -D SERVERNAME="\"An-Penta-Mini\""
  -D WLED_RELEASE_NAME="\"An-Penta-Mini\""
  -D WLED_MAX_BUSSES=6
  -D WLED_MAX_ANALOG_CHANNELS=6
  -D WLED_MAX_DIGITAL_CHANNELS=2
  -D PIXEL_COUNTS=1
  -D LED_TYPES=TYPE_ANALOG_5CH
  -D DATA_PINS=3,0,1,4,5
  -D BTNPIN=2,8,9,-1
  -D BTNTYPE=BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH
  -D I2CSDAPIN=6
  -D I2CSCLPIN=7
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D USERMOD_INTERNAL_TEMPERATURE
  # The USERMOD_TEST_MODE displays a test pattern on the outputs for factory testing. This usermod is optional.
  #-D USERMOD_TEST_MODE
extra_scripts = ${scripts_defaults.extra_scripts}
#
# Dig-Quad V3
# 
# All versions have the following base setup:
# 4 LED outputs with 30 LED's
# Button pin on GPIO 0
# Brightness limiter on 1250 mA
# Relay pin on 15 (Q1 on the boards)
#

[env:dig-Quad-V3]
board = esp32dev
platform = ${esp32.platform}
platform_packages = ${esp32.platform_packages}
build_unflags = ${common.build_unflags}
build_flags = ${common.build_flags} ${esp32.build_flags}
  -D WLED_PRODUCT_NAME="\"Dig-Quad-V3\""
  -D SERVERNAME="\"Dig-Quad-V3\""
  -D WLED_RELEASE_NAME="\"Dig-Quad-V3\""
  ${digboards.build_flags_quinled}
  ${digboards.build_flags_dig_quad}
  ${digboards.build_flags_dig_ar}
  ${digboards.build_flags_ethernet}
  ${digboards.build_flags_temperature}
  ${esp32.AR_build_flags}
lib_deps = ${esp32.lib_deps}
  ${digboards.lib_deps_temperature}
  ${esp32.AR_lib_deps}
monitor_filters = esp32_exception_decoder
board_build.partitions = ${esp32.default_partitions}
extra_scripts = ${scripts_defaults.extra_scripts}


[env:dig-Quad-V3-AEplus]
board = esp32dev
platform = ${esp32.platform}
platform_packages = ${esp32.platform_packages}
build_unflags = ${common.build_unflags}
