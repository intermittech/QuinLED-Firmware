#
#
# Dig2Go
#
#
[env:dig2go]
board = esp32dev
platform = ${esp32.platform}
build_unflags = ${common.build_unflags}
build_flags = ${common.build_flags} ${esp32.build_flags}
  ${digboards.build_flags_quinled}
  -D WLED_BRAND="\"QuinLED\""
  -D WLED_PRODUCT_NAME="\"Dig2Go-Audioreactive\""
  -D SERVERNAME="\"Dig2Go-AR\""
  -D WLED_RELEASE_NAME="\"Dig2Go-Audioreactive\""
  -D WLED_DISABLE_BLYNK
  -D UM_AUDIOREACTIVE_ENABLE
  -D IR_ENABLE_DEFAULT=true
  -D LEDPIN=16
  -D PIXEL_COUNTS=300
  -D ABL_MILLIAMPS_DEFAULT=1250
  -D USERMOD_MULTI_RELAY
  -D MULTI_RELAY_MAX_RELAYS=4
  -D MULTI_RELAY_PINS=12,-1,-1,-1
  -D BTNPIN=0
  -D IRPIN=5
  -D DMENABLED=1
  ${esp32.AR_build_flags}
  -D SR_DMTYPE=1
  -D I2S_SDPIN=19
  -D I2S_WSPIN=4
  -D I2S_CKPIN=18 
  -D SR_SQUELCH=10
  -D SR_GAIN=30
lib_deps = ${esp32.lib_deps}
  ${esp32.AR_lib_deps}
monitor_filters = esp32_exception_decoder
board_build.partitions = ${esp32.default_partitions}
extra_scripts = ${scripts_defaults.extra_scripts}